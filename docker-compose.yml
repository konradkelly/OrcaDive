services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: orcadive
      POSTGRES_USER: orcadive
      POSTGRES_PASSWORD: orcadive
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  server:
    build: ./server
    ports:
      - "3000:3000"
    depends_on:
      - db
    env_file:
      - .env
    environment:
      DATABASE_URL: jdbc:postgresql://db:5432/orcadive?user=orcadive&password=orcadive

volumes:
  pgdata:
